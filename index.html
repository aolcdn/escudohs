<body>

    <script type="text/babel">

        const {
            useState,
            useEffect,
            useMemo,
            createContext,
            useContext
        } = React;

        // --- DATA --- //
        const statesData = {
          PR: { name: "Paraná", emoji: "🌲", firstInstanceTendency: "alta", secondInstanceTendency: "confirmatória", secondInstanceRisk: "alto", multaECA_min: 3, multaECA_max: 20, avgTime1st: 18, avgTime2nd: 14, notes: "O Paraná apresenta, entre os estados com mais casos documentados, uma das tendências mais consistentes de confirmação da 1ª instância pelo TJ. Famílias neste estado encontram menor espaço de reversão em recurso. A estratégia de prevenção e documentação é especialmente relevante neste contexto.", sources: "Baseado em análise de decisões públicas do TJ-PR (2021–2025)" },
          SP: { name: "São Paulo", emoji: "🏙️", firstInstanceTendency: "moderada-alta", secondInstanceTendency: "variável por comarca", secondInstanceRisk: "médio", multaECA_min: 3, multaECA_max: 20, avgTime1st: 20, avgTime2nd: 16, notes: "São Paulo apresenta grande variabilidade entre comarcas. A capital tende a maior rigor do que o interior. O comportamento do MP-SP também varia por região.", sources: "Baseado em análise de decisões públicas do TJ-SP (2021–2025)" },
          MG: { name: "Minas Gerais", emoji: "⛰️", firstInstanceTendency: "moderada", secondInstanceTendency: "tendência confirmatória com redução de multas em alguns casos", secondInstanceRisk: "médio", multaECA_min: 3, multaECA_max: 15, avgTime1st: 22, avgTime2nd: 18, notes: "MG apresenta comportamento mais moderado em comparação com PR e RJ. Há relatos de arquivamento pelo MP-MG após apresentação de documentação educacional.", sources: "Baseado em análise de decisões públicas do TJ-MG (2021–2025)" },
          SC: { name: "Santa Catarina", emoji: "🌊", firstInstanceTendency: "moderada", secondInstanceTendency: "tendência confirmatória com variação", secondInstanceRisk: "médio", multaECA_min: 3, multaECA_max: 15, avgTime1st: 16, avgTime2nd: 12, notes: "SC tem histórico de casos com desfechos variados. O caso Regiane (SC) é referência nacional de processo de longa duração.", sources: "Baseado em análise de decisões públicas do TJ-SC (2021–2025)" },
          RS: { name: "Rio Grande do Sul", emoji: "🐴", firstInstanceTendency: "moderada", secondInstanceTendency: "variável — algumas decisões favoráveis a famílias documentadas", secondInstanceRisk: "médio", multaECA_min: 3, multaECA_max: 15, avgTime1st: 20, avgTime2nd: 15, notes: "RS apresenta histórico de decisões mais equilibradas. O MP-RS tende a maior cautela antes de abertura de ação formal.", sources: "Baseado em análise de decisões públicas do TJ-RS (2021–2025)" },
          RJ: { name: "Rio de Janeiro", emoji: "🏖️", firstInstanceTendency: "alta", secondInstanceTendency: "confirmatória com variabilidade por comarca", secondInstanceRisk: "alto", multaECA_min: 3, multaECA_max: 20, avgTime1st: 24, avgTime2nd: 20, notes: "RJ apresenta alto risco, especialmente na capital. Processos tendem a ser mais longos e multas mais elevadas.", sources: "Baseado em análise de decisões públicas do TJ-RJ (2021–2025)" },
          DF: { name: "Distrito Federal", emoji: "🏛️", firstInstanceTendency: "moderada", secondInstanceTendency: "equilibrado — há precedentes favoráveis a famílias", secondInstanceRisk: "médio-baixo", multaECA_min: 3, multaECA_max: 10, avgTime1st: 14, avgTime2nd: 10, notes: "O DF apresenta ambiente mais favorável ao debate constitucional sobre o tema. Acesso a advogados especializados é mais amplo.", sources: "Baseado em análise de decisões públicas do TJDFT (2021–2025)" },
          Outro: { name: "Outro estado", emoji: "📍", firstInstanceTendency: "indeterminada", secondInstanceTendency: "dados insuficientes", secondInstanceRisk: "indeterminado", multaECA_min: 3, multaECA_max: 20, avgTime1st: 18, avgTime2nd: 14, notes: "Para estados com dados insuficientes, a consulta a advogado local especializado em direito de família é especialmente relevante.", sources: "Estimativa baseada em médias nacionais" }
        };

        const riskQuestions = [
          { id: 1, text: "Em qual estado você mora?", type: "select", options: ["SP","RJ","MG","PR","SC","RS","DF","BA","GO","Outro"], riskMap: { PR: 0.4, SP: 0.2, RJ: 0.3, MG: 0.25, SC: 0.2, RS: 0.2, DF: 0.15, BA: 0.2, GO: 0.2, Outro: 0.2 } },
          { id: 2, text: "Seus filhos já foram matriculados em alguma escola antes?", type: "yesno", riskIfYes: 0.3, riskIfNo: 0.0, hint: "Crianças que nunca foram para a escola chamam menos atenção do sistema." },
          { id: 3, text: "Seus filhos estão matriculados em alguma escola agora?", type: "yesno", riskIfNo: 0.5, riskIfYes: 0.0 },
          { id: 4, text: "O Conselho Tutelar já bateu na sua porta ou mandou carta?", type: "yesno", riskIfYes: 0.4, riskIfNo: 0.0 },
          { id: 5, text: "Você já recebeu alguma carta do juiz ou do promotor (Ministério Público)?", type: "yesno", riskIfYes: 0.6, riskIfNo: 0.0 },
          { id: 6, text: "Existe alguma briga na família (separação, guarda) por causa do estudo em casa?", type: "yesno", riskIfYes: 0.4, riskIfNo: 0.0, hint: "Muitas denúncias começam com brigas entre parentes ou ex-parceiros." },
          { id: 7, text: "As pessoas fora de casa (vizinhos, conhecidos) falam muito sobre seus filhos não irem à escola?", type: "yesno", riskIfYes: 0.25, riskIfNo: 0.0, hint: "Ser discreta ajuda muito a evitar problemas." },
          { id: 8, text: "Você guarda as atividades, fotos e cadernos das crianças bem organizados?", type: "yesno", riskIfYes: -0.3, riskIfNo: 0.25 },
          { id: 9, text: "O seu trabalho permite que você mude de cidade se precisar?", type: "yesno", riskIfYes: -0.05, riskIfNo: 0.0, hint: "Saber se a família pode se mudar caso a situação aperte." },
          { id: 10, text: "Já existe algum processo na justiça sobre os estudos das crianças?", type: "yesno", riskIfYes: 0.8, riskIfNo: 0.0 }
        ];

        const processFlow = [
          { step: 1, icon: "⚠️", location: "Denúncia", title: "Como tudo começa (A Denúncia)", description: "Alguém avisa as autoridades. Pode ser anônimo (pelo Disque 100) ou alguém conhecido. A maioria das denúncias vem de parentes brigados, ex-parceiros ou vizinhos fofoqueiros.", infoBox: "Calma. Uma denúncia não significa que você perdeu. É só o começo de uma verificação." },
          { step: 2, icon: "🏛️", location: "Conselho Tutelar", title: "A visita do Conselho Tutelar", description: "Eles recebem a denúncia e vão checar. Podem mandar uma carta antes ou bater direto na sua porta. O conselheiro pode só olhar, pedir para você matricular a criança, ou passar o caso para frente (para o promotor).", infoBox: "Se eles baterem na sua porta: seja educada, mostre os cadernos e fotos das crianças estudando. Se a coisa ficar séria, chame um advogado.", neutralNote: { title: "Sobre mudar de cidade", description: "O processo corre na cidade onde você mora quando a denúncia é feita. Se você se mudar no meio da confusão, precisa avisar o juiz. Fale com um advogado antes de fazer as malas.", disclaimer: "Isso é só para você entender como funciona, não é um conselho do que fazer." } },
          { step: 3, icon: "⚖️", location: "Promotor (Ministério Público)", title: "O Promotor de Justiça", description: "O Conselho Tutelar passa o caso para o promotor. Ele pode arquivar (encerrar o assunto), pedir para você assinar um acordo, ou abrir um processo com o juiz. Se receber carta deles, não ignore!", infoBox: "Se chegar carta do promotor: procure um advogado na mesma hora. Os prazos são curtos." },
          { step: 4, icon: "🔨", location: "Juiz da Cidade", title: "O Processo com o Juiz (1ª Instância)", description: "Aqui o caso vira um processo de verdade. O juiz vai avaliar. O mais comum é aplicarem uma multa em dinheiro (de 3 a 20 salários mínimos) por a criança estar fora da escola. É muito raro falarem em 'abandono intelectual' se você provar que ensina em casa.", legalRef: "Eles costumam cobrar multa baseada no Artigo 249 do ECA.", infoBox: "Ter pastas com as atividades e fotos das crianças salva vidas nessa hora." },
          { step: 5, icon: "📋", location: "Tribunal do Estado", title: "Recorrer (2ª Instância)", description: "Se o juiz da cidade der a multa, você pode recorrer para os juízes do Estado (Tribunal). Mas atenção: na maioria dos estados, eles concordam com o primeiro juiz e mantêm a multa. Recorrer custa mais dinheiro com advogado e demora mais.", infoBox: "Pense bem se vale a pena gastar mais dinheiro recorrendo. Use a aba 'Custos' para simular." },
          { step: 6, icon: "🏛️", location: "Brasília (STF / STJ)", title: "Juízes de Brasília", description: "É o último recurso. O Supremo já disse que ensinar em casa não é crime, mas falta uma lei aprovada para liberar de vez. Chegar até aqui demora muitos anos e custa uma fortuna.", infoBox: "Só dá para chegar aqui com um advogado muito especialista e muito dinheiro." }
        ];

        const preventionChecklist = [
          { id: "plano_estudos", label: "Plano de estudos escrito e atualizado", priority: "essencial", detail: "Escreva o que a criança vai aprender. Pode ser simples, num caderno, mas precisa estar escrito." },
          { id: "capas_livros", label: "Fotos das capas dos livros e apostilas", priority: "essencial", detail: "Tire foto de tudo que vocês usam para estudar (livros, sites, apostilas)." },
          { id: "amostras_materiais", label: "Fotos de atividades feitas (início, meio e fim)", priority: "essencial", detail: "Guarde algumas atividades que mostrem que a criança está aprendendo e avançando." },
          { id: "fotos_atividades", label: "Fotos da criança estudando e passeando", priority: "essencial", detail: "Tire fotos deles lendo, brincando com outras crianças, em museus ou parques. Coloque a data." },
          { id: "videos_curtos", label: "Vídeos curtos (até 1 minuto)", priority: "essencial", detail: "Grave vídeos rápidos deles lendo ou fazendo alguma atividade prática." },
          { id: "diario", label: "Diário do que foi feito na semana", priority: "alta", detail: "Anote num caderno: a data, o que estudaram e quem estudou. Bem simples." },
          { id: "avaliacoes", label: "Provinhas ou testes guardados", priority: "alta", detail: "Guarde redações ou exercícios corrigidos para mostrar que você acompanha se eles estão aprendendo." },
          { id: "comunicacao_escrita", label: "Fale com órgãos públicos só por escrito", priority: "alta", detail: "Se precisar falar com Conselho Tutelar ou escola, mande e-mail ou carta com aviso de recebimento." },
          { id: "advogado_contato", label: "Tenha o número de um advogado guardado", priority: "alta", detail: "Não espere o problema chegar para procurar quem pode te defender." },
          { id: "referencias", label: "Lista de pessoas que conhecem vocês", priority: "média", detail: "Nome e telefone de pessoas que podem confirmar que você é uma boa mãe e ensina bem." },
          { id: "associacao", label: "Conheça outras famílias que ensinam em casa", priority: "média", detail: "Estar em grupos ou associações ajuda muito a trocar ideias e ter apoio." },
          { id: "privacidade_redes", label: "Cuidado com o que posta na internet", priority: "média", detail: "Pense bem antes de postar a rotina da sua casa para todo mundo ver." },
          { id: "documentos_pessoais", label: "Documentos de todo mundo em dia", priority: "básica", detail: "Deixe RG, certidões e comprovante de endereço fáceis de achar." },
          { id: "vacinacao", label: "Carteira de vacinação em dia", priority: "básica", detail: "Vacina atrasada é um dos motivos que mais chamam a atenção do posto de saúde e do Conselho." }
        ];

        const legalBasis = [
          { id: "eca_249", ref: "Art. 249 ECA", title: "Descumprimento de obrigações parentais", summary: "Multa de 3 a 20 salários mínimos. É o enquadramento observado com mais frequência em casos relacionados ao ensino domiciliar." },
          { id: "cp_246", ref: "Art. 246 CP", title: "Abandono intelectual", summary: "Pena de 15 dias a 1 mês ou multa. Observado com muito menos frequência. Requer prova de que a criança não está sendo instruída — não basta estar fora da escola formal." },
          { id: "stf_re888815", ref: "STF — RE 888815", title: "Ensino domiciliar e Constituição", summary: "O STF entendeu que o ensino domiciliar é compatível com a Constituição, desde que haja lei regulamentadora específica. Até o momento, não há lei federal em vigor disciplinando o tema." },
          { id: "tratados", ref: "Tratados Internacionais de Direitos Humanos", title: "Direito dos pais à escolha educacional", summary: "A Declaração Universal dos Direitos Humanos (Art. 26, §3°) e outros tratados internacionais reconhecem o direito dos pais de escolher o tipo de instrução a ser ministrada aos filhos. Tratados internacionais de direitos humanos têm status supralegal no ordenamento brasileiro." }
        ];

        const communicationScripts = {
            script1: { title: "O que falar para parentes e família", context: "Para usar com avós, tios e pessoas que realmente se importam com vocês.", tone: "Tranquilo, amoroso, sem tentar dar aula de lei", example: `Nós escolhemos ensinar as crianças em casa porque achamos que é o melhor para eles agora.\n\nEstamos acompanhando os estudos bem de perto, com muito cuidado e carinho. Eles têm rotina, cadernos, e estão aprendendo super bem.\n\nA gente sabe que é diferente, mas estamos fazendo tudo com muita responsabilidade. Eles estão felizes e se desenvolvendo muito!`, note: "Falar com amor e mostrar que as crianças estão bem funciona muito melhor do que citar leis ou tentar convencer os parentes." },
            script2: { title: "O que falar para curiosos e vizinhos", context: "Para usar com pessoas que não são íntimas e só querem fofocar.", tone: "Educado, rápido e cortando o assunto", example: `A gente prefere não falar muito sobre a rotina das crianças por segurança, sabe como é o mundo hoje em dia, né?\n\nMas eles estão ótimos, crescendo super rápido. Obrigada por perguntar!`, note: "Você não deve explicações da sua vida para vizinhos. Mude de assunto com educação." },
            script3: { title: "O que ensinar para as crianças falarem", context: "Para proteger as crianças de perguntas chatas de adultos.", importantNote: "⚠️ IMPORTANTE: Se um policial ou alguém do Conselho Tutelar perguntar, a criança não deve mentir. Isso é só para conversas no parquinho ou com vizinhos.", example: `Ensine seus filhos de um jeito simples:\n\n"Filho, tem coisas que são só da nossa família, tipo quanto o papai ganha ou como é a nossa rotina em casa. A gente guarda isso pra gente.\n\nSe algum adulto que você não conhece muito bem ficar fazendo muita pergunta sobre a escola, você pode só sorrir e dizer: 'Ah, a mamãe e o papai que cuidam disso pra mim.' e voltar a brincar."`, note: "A ideia é ensinar a criança a se proteger de fofoqueiros, sem colocar medo nela." }
        };

        // --- CONTEXT & HOOKS --- //
        const AppContext = createContext();

        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.log(error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                setStoredValue(prevValue => {
                    const newValue = value instanceof Function ? value(prevValue) : value;
                    try {
                        window.localStorage.setItem(key, JSON.stringify(newValue));
                    } catch (error) {
                        console.log(error);
                    }
                    return newValue;
                });
            };
            return [storedValue, setValue];
        };

        // --- COMPONENTS --- //

        const Disclaimer = () => (
            <div className="bg-yellow-100 border-yellow-300 text-yellow-900 text-xs p-4 rounded-lg my-4">
                <h4 className="font-bold mb-2">⚠️ AVISO IMPORTANTE</h4>
                <p>Este aplicativo traz informações gerais para te ajudar a entender como as coisas funcionam. Ele não substitui a conversa com um advogado de verdade.</p>
                <p className="mt-2">O objetivo aqui não é ensinar a fugir da lei, mas sim te ajudar a se organizar e se proteger.</p>
                <p className="mt-2">Os valores e tempos mostrados são apenas estimativas. Cada caso é um caso. Se precisar, procure sempre um advogado.</p>
            </div>
        );

        const Logo = () => (
            <div className="flex items-center justify-center space-x-3">
                <svg className="w-12 h-12 text-blue-800" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <h1 className="text-3xl font-bold text-gray-800 font-sora">Escudo HS</h1>
            </div>
        );

        const HomeScreen = ({ setActiveScreen }) => (
            <div className="p-4">
                <Logo />
                <p className="text-center text-gray-600 mt-2 mb-6">Informação é a sua melhor preparação.</p>
                
                <div className="bg-green-100 border-2 border-green-500 text-green-900 p-5 rounded-xl mb-6 shadow-sm text-center">
                    <h3 className="font-bold text-lg mb-2">A Regra de Ouro 🌟</h3>
                    <p className="text-sm">O melhor cenário de todos é <strong>sempre evitar que a denúncia aconteça</strong>. A discrição, o cuidado com quem você fala e a organização são os seus maiores escudos.</p>
                </div>

                <div className="bg-blue-50 border border-blue-200 text-blue-800 text-sm p-4 rounded-lg mb-6">
                  <p>Este app foi feito para te ajudar a entender os riscos e se organizar. Lembre-se: ele não substitui um advogado. Use para se informar e se preparar.</p>
                </div>
                <button onClick={() => setActiveScreen('risk')} className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg text-lg mb-8 transition-colors">Entender meu perfil de risco</button>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <button onClick={() => setActiveScreen('risk')} className="bg-white border border-gray-200 rounded-lg p-4 text-center hover:bg-gray-50 transition-colors shadow-sm">
                        <span className="text-2xl">🛡️</span>
                        <p className="font-semibold mt-2">Risco</p>
                    </button>
                    <button onClick={() => setActiveScreen('costs')} className="bg-white border border-gray-200 rounded-lg p-4 text-center hover:bg-gray-50 transition-colors shadow-sm">
                        <span className="text-2xl">💰</span>
                        <p className="font-semibold mt-2">Custos</p>
                    </button>
                    <button onClick={() => setActiveScreen('flow')} className="bg-white border border-gray-200 rounded-lg p-4 text-center hover:bg-gray-50 transition-colors shadow-sm">
                        <span className="text-2xl">📊</span>
                        <p className="font-semibold mt-2">Fluxo</p>
                    </button>
                    <button onClick={() => setActiveScreen('communication')} className="bg-white border border-gray-200 rounded-lg p-4 text-center hover:bg-gray-50 transition-colors shadow-sm">
                        <span className="text-2xl">💬</span>
                        <p className="font-semibold mt-2">Comunicação</p>
                    </button>
                    <button onClick={() => setActiveScreen('states')} className="bg-white border border-gray-200 rounded-lg p-4 text-center hover:bg-gray-50 transition-colors shadow-sm">
                        <span className="text-2xl">🗺️</span>
                        <p className="font-semibold mt-2">Estados</p>
                    </button>
                     <button onClick={() => setActiveScreen('checklist')} className="bg-white border border-gray-200 rounded-lg p-4 text-center hover:bg-gray-50 transition-colors shadow-sm">
                        <span className="text-2xl">📋</span>
                        <p className="font-semibold mt-2">Checklist</p>
                    </button>
                </div>
            </div>
        );

        const RiskScreen = () => {
            const [answers, setAnswers] = useLocalStorage('riskAnswers', {});

            const handleAnswerChange = (id, value) => {
                setAnswers(prev => ({ ...prev, [id]: value }));
            };

            const riskScore = useMemo(() => {
                return riskQuestions.reduce((total, q) => {
                    const answer = answers[q.id];
                    if (answer === undefined) return total;

                    if (q.type === 'select') {
                        return total + (q.riskMap[answer] || 0);
                    }
                    if (q.type === 'yesno') {
                        if (answer === 'yes') return total + (q.riskIfYes || 0);
                        if (answer === 'no') return total + (q.riskIfNo || 0);
                    }
                    return total;
                }, 0);
            }, [answers]);

            const riskProfile = useMemo(() => {
                if (riskScore <= 0.3) return { level: 'BAIXA EXPOSIÇÃO', color: 'text-green-400', bgColor: 'bg-green-900', text: 'Sua rotina chama pouca atenção. Continue mantendo tudo organizado e seja discreta.' };
                if (riskScore <= 0.7) return { level: 'EXPOSIÇÃO MODERADA', color: 'text-yellow-400', bgColor: 'bg-yellow-900', text: 'Algumas coisas na sua rotina chamam atenção. É bom organizar seus documentos e ter cuidado com quem você conversa.' };
                return { level: 'ALTA EXPOSIÇÃO', color: 'text-red-400', bgColor: 'bg-red-900', text: 'Sua situação chama bastante atenção. É muito importante organizar suas provas de estudo e, se puder, conversar com um advogado para se prevenir.' };
            }, [riskScore]);
            
            const selectedState = answers[1];

            return (
                <div className="p-4">
                    <h2 className="text-2xl font-bold text-gray-800 mb-2">Entenda seu perfil de risco</h2>
                    
                    <div className="bg-blue-50 border border-blue-200 p-3 rounded-lg mb-6 text-sm text-blue-800">
                        <strong>Para que serve esta tela?</strong><br/>
                        Responda as perguntas para descobrir se a sua rotina chama muita atenção e o que você pode mudar para evitar problemas.
                    </div>

                    <div className="space-y-6">

            ];

            return (
                <div className="bg-light min-h-screen font-sora text-primary pb-24">
                    <div className="max-w-4xl mx-auto">
                        {screens[activeScreen]}
                    </div>
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around shadow-t-md">
                        {navItems.map(item => (
                            <button 
                                key={item.id} 
                                onClick={() => handleNavigate(item.id)} 
                                className={`flex-1 flex flex-col items-center justify-center p-2 text-xs transition-colors ${activeScreen === item.id ? 'text-blue-700 bg-gray-100' : 'text-gray-500'}`}>
                                <span className="text-xl">{item.icon}</span>
                                <span>{item.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);

    </script>
</body>
</html>
